<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="manifest.default_icon"
      content="{ '16': '/icon-16.png', '128': '/icon-128.png' }"
    />
    <link rel="icon" href="/icon-16.png" />
    <title>Simple Hotkeys</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main>
      <header>
        <img src="/icon-128.png" alt="" />
        <div>
          <p class="eyebrow">Browser shortcuts</p>
          <h1>Simple Hotkeys</h1>
        </div>
      </header>

      <ul id="shortcut-list" aria-label="Configured shortcuts"></ul>

      <button id="configure-button" type="button">Configure shortcuts</button>
      <p id="safari-help" class="help" hidden>
        Configure extension shortcuts in browser settings.
      </p>
    </main>
  </body>
</html>
